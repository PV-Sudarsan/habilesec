<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&family=EB+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --g1:#b8965a;
  --g2:#dfc98a;
  --g3:#f5e6c8;
  --g4:#6b4e28;
  --bg:#0a0806;
  --bg2:#100d09;
  --cream:#f0e8d8;
  --muted:#6b5f50;
  --border:rgba(184,150,90,0.18);
  --border2:rgba(184,150,90,0.35);
}

html,body{height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;align-items:center;justify-content:center;position:relative;font-family:'Tenor Sans',sans-serif}

/* Deep layered background */
.bg-layer{position:fixed;inset:0;z-index:0}
.bg-layer::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 70% at 50% -10%, rgba(184,150,90,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 15% 50%, rgba(184,150,90,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 85% 60%, rgba(107,78,40,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 50% 110%, rgba(184,150,90,0.08) 0%, transparent 60%);
}

/* Subtle vignette */
.vignette{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 85% 85% at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);pointer-events:none}

/* Canvas for lines */
#canvas{position:fixed;inset:0;z-index:2;opacity:0.6;pointer-events:none}
.contact-mail{
  margin-bottom:40px;
  opacity:0;
  animation:fadeIn 1s ease 2s forwards;
}

.contact-mail a{
  font-size:11px;
  letter-spacing:0.25em;
  color:var(--g2);
  text-decoration:none;
  transition:0.3s ease;
  border-bottom:1px solid rgba(184,150,90,0.3);
  padding-bottom:6px;
}

.contact-mail a:hover{
  color:var(--g3);
  border-color:var(--g2);
}

/* Side vertical text */
.side-text{
  position:fixed;z-index:10;
  font-size:9px;letter-spacing:0.45em;color:var(--g4);
  text-transform:uppercase;writing-mode:vertical-rl;
  opacity:0;animation:fadeIn 2s ease 2s forwards;
}
.side-text.left{left:32px;top:50%;transform:translateY(-50%)}
.side-text.right{right:32px;top:50%;transform:translateY(-50%) rotate(180deg)}

/* Main stage */
.stage{
  position:relative;z-index:10;
  text-align:center;
  max-width:800px;
  padding:0 48px;
}

/* Top micro label */
.micro{
  display:inline-flex;align-items:center;gap:14px;
  margin-bottom:52px;
  opacity:0;animation:fadeIn 1s ease 0.4s forwards;
}
.micro-line{width:40px;height:1px;background:var(--g1);opacity:0.5}
.micro span{font-size:9px;letter-spacing:0.55em;color:var(--g1);text-transform:uppercase}

/* Giant headline */
.headline-wrap{margin-bottom:0;overflow:visible}

.hl1{
  font-family:'Tenor Sans',sans-serif;
  font-size:clamp(11px,1.4vw,16px);
  letter-spacing:0.55em;
  color:var(--g2);
  text-transform:uppercase;
  display:block;margin-bottom:18px;
  opacity:0;animation:fadeIn 1s ease 0.7s forwards;
}

.hl2{
  font-family:'Playfair Display',serif;
  font-size:clamp(72px,13vw,148px);
  font-weight:300;
  line-height:0.85;
  letter-spacing:-0.03em;
  color:var(--cream);
  display:block;
  opacity:0;animation:riseIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
  position:relative;
}

.hl2 .stroke-text{
  -webkit-text-stroke:1px rgba(184,150,90,0.5);
  color:transparent;
  display:block;
}

.hl3{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(56px,9vw,110px);
  font-weight:300;
  line-height:1;
  letter-spacing:-0.01em;
  color:var(--g2);
  display:block;
  opacity:0;animation:riseIn 1.4s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
}

/* Ornamental divider */
.divider{
  margin:42px auto 42px;
  width:320px;
  opacity:0;animation:fadeIn 1.2s ease 1.5s forwards;
}

/* Description */
.desc{
  font-family:'EB Garamond',serif;
  font-size:clamp(14px,1.6vw,18px);
  font-style:italic;
  font-weight:300;
  letter-spacing:0.04em;
  color:var(--muted);
  line-height:1.9;
  max-width:500px;
  margin:0 auto 52px;
  opacity:0;animation:fadeIn 1s ease 1.8s forwards;
}

/* Socials */
.socials{
  display:flex;justify-content:center;align-items:center;gap:0;
  margin-bottom:52px;
  opacity:0;animation:fadeIn 1s ease 2s forwards;
}
.socials a{
  font-size:9px;letter-spacing:0.4em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  padding:0 24px;
  transition:color 0.3s;
  position:relative;
}
.socials a:not(:last-child)::after{
  content:'·';position:absolute;right:0;top:50%;transform:translateY(-50%);
  color:var(--g4);
}
.socials a:hover{color:var(--g2)}

/* Copyright */
.copy{
  font-size:9px;letter-spacing:0.3em;color:var(--g4);text-transform:uppercase;
  opacity:0;animation:fadeIn 1s ease 2.2s forwards;
}

/* Full-width border lines top & bottom */
.border-top,.border-bottom{
  position:fixed;left:48px;right:48px;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2) 20%,var(--border2) 80%,transparent);
  z-index:10;
  opacity:0;animation:fadeIn 1.5s ease 0.2s forwards;
}
.border-top{top:36px}
.border-bottom{bottom:36px}

/* Corner diamonds */
.cdiamond{
  position:fixed;width:8px;height:8px;z-index:11;
  border:1px solid var(--g1);transform:rotate(45deg);
  opacity:0;animation:fadeIn 1.5s ease 0.5s forwards;
}
.cdiamond.tl{top:32px;left:44px}
.cdiamond.tr{top:32px;right:44px}
.cdiamond.bl{bottom:32px;left:44px}
.cdiamond.br{bottom:32px;right:44px}

/* Floating orbs */
.orb{
  position:fixed;border-radius:50%;
  background:radial-gradient(circle,rgba(184,150,90,0.15) 0%,transparent 70%);
  pointer-events:none;z-index:3;
  animation:orbPulse ease-in-out infinite alternate;
}

@keyframes riseIn{
  0%{opacity:0;transform:translateY(40px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  0%{opacity:0}100%{opacity:1}
}
@keyframes orbPulse{
  0%{transform:scale(1) translate(0,0)}
  100%{transform:scale(1.15) translate(10px,-10px)}
}

/* Shimmer line animation on headline */
.shimmer-wrap{position:relative;display:inline-block}
.shimmer-wrap::after{
  content:'';
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent 40%,rgba(245,230,200,0.06) 50%,transparent 60%);
  animation:shimmer 6s ease-in-out 3s infinite;
  pointer-events:none;
}
@keyframes shimmer{
  0%{left:-100%}
  40%,100%{left:140%}
}

@media(max-width:600px){
  .stage{padding:0 24px}
  .side-text{display:none}
  .border-top{top:20px}
  .border-bottom{bottom:20px}
  .border-top,.border-bottom{left:20px;right:20px}
  .cdiamond.tl{top:16px;left:16px}
  .cdiamond.tr{top:16px;right:16px}
  .cdiamond.bl{bottom:16px;left:16px}
  .cdiamond.br{bottom:16px;right:16px}
  .socials a{padding:0 14px}
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="vignette"></div>
<canvas id="canvas"></canvas>

<!-- Floating orbs -->
<div class="orb" style="width:500px;height:500px;top:-100px;left:-100px;animation-duration:14s"></div>
<div class="orb" style="width:400px;height:400px;bottom:-80px;right:-80px;animation-duration:18s;animation-delay:3s"></div>
<div class="orb" style="width:200px;height:200px;top:40%;right:10%;animation-duration:10s;animation-delay:6s;opacity:0.5"></div>

<!-- Frame -->
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="cdiamond tl"></div>
<div class="cdiamond tr"></div>
<div class="cdiamond bl"></div>
<div class="cdiamond br"></div>

<!-- Side text -->
<div class="side-text left">Since 2021 &nbsp;&mdash;&nbsp; The Art of Excellence</div>
<div class="side-text right">Since 2021 &nbsp;&mdash;&nbsp; The Art of Excellence</div>

<!-- Main -->
<div class="stage">

  <div class="micro">
    <div class="micro-line"></div>
    <span>Under Construction</span>
    <div class="micro-line"></div>
  </div>

  <div class="headline-wrap">
    <span class="hl1">The future is being forged</span>
    <div class="shimmer-wrap">
      <span class="hl2">
        <span class="stroke-text">Coming</span>
      </span>
    </div>
    <span class="hl3">Soon</span>
  </div>

  <div class="divider">
    <svg viewBox="0 0 320 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="14" x2="118" y2="14" stroke="url(#gl)" stroke-width="0.7"/>
      <polygon points="136,14 128,9 128,19" fill="none" stroke="#b8965a" stroke-width="0.7"/>
      <rect x="147" y="10" width="8" height="8" fill="none" stroke="#b8965a" stroke-width="0.7" transform="rotate(45 151 14)"/>
      <polygon points="184,14 176,9 176,19" fill="none" stroke="#b8965a" stroke-width="0.7" transform="scale(-1,1) translate(-320,0)"/>
      <line x1="202" y1="14" x2="320" y2="14" stroke="url(#gr)" stroke-width="0.7"/>
      <circle cx="151" cy="14" r="2" fill="#b8965a"/>
      <defs>
        <linearGradient id="gl" x1="0" y1="0" x2="118" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#b8965a" stop-opacity="0"/>
          <stop offset="100%" stop-color="#b8965a" stop-opacity="0.8"/>
        </linearGradient>
        <linearGradient id="gr" x1="202" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#b8965a" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#b8965a" stop-opacity="0"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
<div class="contact-mail">
  <b style="color:var(--g2);">Contact Us</b> <br><br>
  <a href="mailto:enquiry@habilesec.com"><b>enquiry@habilesec.com</b></a>
</div>
  <p class="desc">
    Something magnificent is taking shape.<br>
    An experience unlike anything you've seen before.
  </p>


  <p class="copy">&copy; 2026 &nbsp;&mdash;&nbsp; Habilesec All rights reserved</p>

</div>

<script>
// Animated canvas — thin radial lines emanating from center
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, lines=[], t=0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// Create sparse elegant lines
const NUM = 24;
for(let i=0;i<NUM;i++){
  const angle = (i/NUM)*Math.PI*2 + Math.random()*0.1;
  lines.push({
    angle,
    length: 0.3 + Math.random()*0.4,
    speed: 0.0002 + Math.random()*0.0003,
    phase: Math.random()*Math.PI*2,
    opacity: 0.03 + Math.random()*0.05,
    width: 0.3 + Math.random()*0.4
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t += 0.008;

  const maxR = Math.sqrt(cx*cx + cy*cy);

  lines.forEach(l => {
    const pulse = Math.sin(t*l.speed*100 + l.phase)*0.5+0.5;
    const r = maxR * l.length * pulse;
    const x2 = cx + Math.cos(l.angle + t*l.speed*5)*r;
    const y2 = cy + Math.sin(l.angle + t*l.speed*5)*r;

    const grad = ctx.createLinearGradient(cx, cy, x2, y2);
    grad.addColorStop(0, `rgba(184,150,90,0)`);
    grad.addColorStop(0.4, `rgba(184,150,90,${l.opacity * pulse})`);
    grad.addColorStop(1, `rgba(184,150,90,0)`);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = grad;
    ctx.lineWidth = l.width;
    ctx.stroke();
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
